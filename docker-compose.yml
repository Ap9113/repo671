version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: amazonlike_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: amazonlike
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  app:
    build: .
    container_name: amazonlike_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/amazonlike?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - db
volumes:
  db_data:
